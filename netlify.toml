[build]
  # netlify's cache system is causing issues with bun
  # so node_modules must be cleared before building
  # before netlify explicitly offers an option to disable caching
  # in netlify.toml
  command = "rm -rf node_modules && bun install && bun run build --base /"
  publish = "docs/.vitepress/dist"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/blog/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/posts/*"
  to = "/breves/:splat"
  status = 301

# Headers from vercel.json (and existing _headers)
[[headers]]
  for = "/feed.rss"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs.settings]
    preset = "desktop"

